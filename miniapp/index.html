<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New_Line — Limit Orders</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header__title">New_Line</div>
      <div class="header__meta">
        <span class="health" id="health">●</span>
        <span class="counter" id="counter">0 лимиток</span>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab tab--active" data-tab="active">Активные</button>
      <button class="tab" data-tab="history">История</button>
    </nav>

    <main class="main">
      <section id="view-active" class="view">
        <div id="active-list" class="card-list">
          <p class="empty">Нет активных лимиток</p>
        </div>
      </section>

      <section id="view-history" class="view view--hidden">
        <div id="history-list" class="card-list">
          <p class="empty">История пуста</p>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
